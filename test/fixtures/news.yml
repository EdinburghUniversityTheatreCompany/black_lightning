current_news:
  title: Current News Article
  body: This is the body of a current news article with enough content to test previews.
  slug: current-news-article
  publish_date: <%= 1.day.ago.to_fs(:db) %>
  show_public: true
  author_id: 1

future_news:
  title: Future News Article
  body: This news article is scheduled for the future.
  slug: future-news-article
  publish_date: <%= 1.week.from_now.to_fs(:db) %>
  show_public: true
  author_id: 1
