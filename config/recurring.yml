daily_maintenance:
  class: DailyMaintenanceJob
  queue: default
  schedule: at 2am every day

refresh_cloudflare_ips:
  class: RefreshCloudflareIpsJob
  queue: default
  schedule: every 12 hours

refresh_fuzzy_duplicates:
  class: RefreshFuzzyBothDuplicatesJob
  queue: default
  schedule: at 4am every day

opportunity_digest:
  class: OpportunityDigestJob
  queue: default
  schedule: at 9am every day

reimbursements_credentials_check:
  class: Reimbursements::CredentialsCheckJob
  queue: default
  schedule: at 8am every day

reimbursements_mailbox_poll:
  class: Reimbursements::MailboxPollJob
  queue: default
  schedule: every 5 minutes

# Fires nightly; the job itself skips cost centres whose run-days don't include
# today and de-dupes via CostCentre#nightly_due?, so a daily trigger is safe.
reimbursements_nightly_batch:
  class: Reimbursements::NightlyBatchJob
  queue: default
  schedule: at 9pm every day
