services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.dev
    volumes:
      - ..:/workspaces/BlackLightning:cached
      - bundle-cache:/bundle
      # Persist the mise toolchain (Ruby/Node/hk/...) across rebuilds so the one-time
      # Ruby compile in `mise install` is not repeated. Path matches MISE_DATA_DIR.
      - mise-data:/home/vscode/.local/share/mise
    command: sleep infinity
    environment:
      BUNDLE_PATH: /bundle/vendor
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: password
    depends_on:
      - mysql
    ports:
      # Host publish tracks $PORT so parallel per-worktree devcontainers don't clash on one host
      # port (worktree-setup's isolate writes PORT into .devcontainer/.env). Falls back to 3000.
      - "${PORT:-3000}:${PORT:-3000}"

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql-data:/var/lib/mysql
    # No host port published: the app reaches MySQL over the compose network (DB_HOST: mysql), and
    # not publishing keeps parallel per-worktree devcontainers from clashing on the DB host port.
    # For a host-side DB GUI, forward on demand: `docker compose port mysql 3306`.

volumes:
  mysql-data:
  bundle-cache:
  mise-data:
