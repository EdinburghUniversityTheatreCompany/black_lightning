# database configured to use mysql
# Make sure you set up a different test database and development database.

default: &default
  adapter: mysql2
  encoding: utf8mb4
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: "<%= ENV.fetch('DB_USERNAME') { Rails.application.credentials.dig(:database, :username) } %>"
  password: "<%= ENV.fetch('DB_PASSWORD') { Rails.application.credentials.dig(:database, :password) } %>"
  host: "<%= ENV.fetch('DB_HOST') { '127.0.0.1' } %>"
  port: 3306

development:
  primary:
    <<: *default
    database: bedlam_blacklightning_development

  queue:
    <<: *default
    database: bedlam_blacklightning_development_queue
    migrations_paths: db/queue_migrate

  cache:
    <<: *default
    database: bedlam_blacklightning_development_cache
    migrations_paths: db/cache_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
#
# WORKTREE_DB_SUFFIX lets parallel git worktrees each run tests against their own
# database (e.g. "_phaseb"), so concurrent `bin/rails test` runs don't truncate
# each other's fixtures. Empty by default -> the normal shared test DB.
test:
  <<: *default
  database: bedlam_blacklightning_test<%= ENV.fetch("WORKTREE_DB_SUFFIX", "") %>

production:
  primary: &primary_production
    adapter: mysql2
    encoding: utf8mb4
    reconnect: false
    database: bedlam_blacklightning_production
    pool: 5
    username: "<%= ENV['DATABASE_USERNAME'] %>"
    password: "<%= ENV['MYSQL_ROOT_PASSWORD'] %>"
    host: "<%= ENV['DATABASE_HOST'] %>"
  queue:
    <<: *primary_production
    database: bedlam_blacklightning_production_queue
    migrations_paths: db/queue_migrate

  cache:
    <<: *primary_production
    database: bedlam_blacklightning_production_cache
    migrations_paths: db/cache_migrate
