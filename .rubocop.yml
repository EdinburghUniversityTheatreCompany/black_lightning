# Omakase Ruby styling for Rails
inherit_gem:
  rubocop-rails-omakase: rubocop.yml

plugins:
  - rubocop-view_component

# Project-specific exclusions
AllCops:
  Exclude:
    - lib/generators/**/templates/**/*
    - db/schema.rb
    - db/queue_schema.rb
    - db/cache_schema.rb

ViewComponent/MissingPreview:
  Exclude:
    - "**/application_component.rb"
