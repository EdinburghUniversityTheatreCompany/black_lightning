# dev-env standard (dev-hooks:dev-env-setup) — gitleaks allowlist.
#
# The hk `gitleaks` step (and any local `gitleaks dir`) scans the WHOLE working tree —
# gitleaks `dir` has no respect-gitignore flag, so it walks gitignored files too.
# Without this allowlist, any repo with a local `.env`, `log/`, `tmp/`, or a Rails
# `config/credentials/*.key` produces findings on every commit and `hk run check` is permanently
# red, even though none of those files are tracked or in history.
#
# gitleaks auto-loads `.gitleaks.toml` from the scan root, so the hk builtin and CI's
# `gitleaks git` job pick this up with no `--config` flag. `useDefault = true` keeps the full
# default ruleset; the allowlist is
# PATH-SCOPED to gitignored runtime/secret locations only — app/config SOURCE stays fully scanned,
# so a real secret hardcoded in code is still caught. (Force-adding a secret into one of these
# paths with `git add -f` would evade the scan; the env-to-fnox skill is the path to get the
# plaintext secret out of the repo entirely.)
[extend]
useDefault = true

[allowlist]
description = "gitignored local artifacts + local-only secret files (never committed)"
paths = [
  '''^\.env''',                        # dotenv — gitignored
  '''^log/''', '''^tmp/''',            # Rails runtime artifacts
  '''^\.venv/''',                      # Python (shell/py stacks)
  '''^node_modules/''', '''^vendor/''',
  '''^config/credentials/.*\.key$''',  # Rails master keys (the *.yml.enc blobs stay scanned)
  '''^config/secrets\.yml$''',         # gitignored local Rails secrets (legacy secrets.yml — never committed)
  '''^\.worktrees/''',                 # git worktrees (full repo copies incl. local secrets)
  '''^\.claude/worktrees/''',          # native-tool git worktrees (same)
]
