name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions: {}

jobs:
  scan_ruby:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Make bin files executable
        run: chmod +x bin/*

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for vulnerable gem versions
        run: bundle exec bundler-audit --update

  lint_ruby:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Make bin files executable
        run: chmod +x bin/*

      - name: Lint Ruby code for consistent style
        # rubocop loads the rubocop-rails/-view_component/-minitest plugins via .rubocop.yml.
        run: bin/rubocop -f github

      # herb-lint GATES (ERB backlog cleared to 0 — see plans/off-topic-improvements.md).
      # herb-analyze stays advisory only because the two HTML-email fragment partials
      # (shared/mail/_header|_footer) can't be parsed standalone and `herb analyze` has no exclude
      # flag; herb-lint's parser-no-errors rule covers parse errors for every other template.
      - name: Analyze ERB templates for parse errors (herb, advisory — email fragments only)
        run: bundle exec herb analyze app/ || true

      - name: Lint ERB templates (herb)
        # `herb lint` delegates to npx @herb-tools/linter (version pinned to the herb gem); the
        # runner ships Node. --github emits Actions annotations.
        run: bundle exec herb lint app/ --github

      - name: Executable bits on shipped scripts
        # Any tracked file whose first line is a shebang must be mode 100755 in the index — with
        # core.fileMode=false a local chmod never reaches git, and a 100644 script dies with exit
        # 126 on every fresh clone. Checks the INDEX, so the `chmod +x bin/*` step doesn't mask it.
        # Mirrors the hk `exec-bit-scripts` step so CI and pre-commit agree.
        run: |
          bad=$(git ls-files -s | awk -F'\t' '$1 ~ /^100644/ { if ((getline line < $2) > 0 && line ~ /^#!/) print $2; close($2) }')
          if [ -n "$bad" ]; then
            echo "Shebang scripts missing the executable bit in the git index. Fix: git update-index --chmod=+x <file>"
            echo "$bad"
            exit 1
          fi

  lint_js:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # No version pin here: pnpm/action-setup reads it from package.json's `packageManager`
        # field, keeping CI on the same pnpm as the dev container and host (both via corepack).

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint JavaScript code for consistent style
        run: pnpm lint

  # Guard against toolchain drift: Ruby/Node are pinned in several places (mise.toml is the
  # source of truth; .ruby-version/.node-version feed CI + setup-ruby/-node; the prod Dockerfile
  # bakes them into the image). This is the bug that let the prod image ship Node 22 while
  # everything else ran 24 — fail CI if they ever diverge again. Mirrors the hk `versions`
  # step (hk.pkl) so pre-commit and CI agree; keep both in sync by hand.
  versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Toolchain versions are consistent
        run: |
          fail=0
          ruby_file=$(tr -d '[:space:]' < .ruby-version)
          node_file=$(tr -d '[:space:]' < .node-version)
          ruby_mise=$(sed -n 's/^ruby[[:space:]]*=[^"]*"\([^"]*\)".*/\1/p' mise.toml)
          node_mise=$(sed -n 's/^node[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' mise.toml)
          ruby_docker=$(sed -n 's/^ARG RUBY_VERSION=//p' Dockerfile | tr -d '[:space:]')
          echo "ruby -> .ruby-version=$ruby_file mise.toml=$ruby_mise Dockerfile=$ruby_docker"
          echo "node -> .node-version=$node_file mise.toml=$node_mise (Dockerfile derives major)"
          [ "$ruby_file" = "$ruby_mise" ] || { echo "::error::mise.toml ruby ($ruby_mise) != .ruby-version ($ruby_file)"; fail=1; }
          [ "$ruby_file" = "$ruby_docker" ] || { echo "::error::Dockerfile ARG RUBY_VERSION ($ruby_docker) != .ruby-version ($ruby_file)"; fail=1; }
          [ "$node_file" = "$node_mise" ] || { echo "::error::mise.toml node ($node_mise) != .node-version ($node_file)"; fail=1; }
          grep -qF 'setup_$(cut -d. -f1 < .node-version)' Dockerfile || { echo "::error::prod Dockerfile must derive the Node major from .node-version, not hardcode it"; fail=1; }
          ! grep -q '^ARG NODE_VERSION=' Dockerfile || { echo "::error::remove hardcoded ARG NODE_VERSION from Dockerfile; derive it from .node-version"; fail=1; }
          exit $fail

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    services:
      mysql:
        image: mysql:8.4@sha256:c36050afdca850f23cef85703f84c7531a5ae155a11b5ee1c60acb09937c4084
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s
          --health-timeout=5s --health-retries=3
      # redis:
      #   image: redis
      #   ports:
      #     - 6379:6379
      #   options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y
          build-essential git libpq-dev pkg-config google-chrome-stable
          libvips-dev

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # No version pin here: pnpm/action-setup reads it from package.json's `packageManager`
        # field, keeping CI on the same pnpm as the dev container and host (both via corepack).

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Make bin files executable
        run: chmod +x bin/*

      - name: Build JavaScript assets
        run: bin/vite build --mode=test
        env:
          RAILS_ENV: test

      - name: Run tests
        env:
          RAILS_ENV: test
          DB_USERNAME: root
          DB_PASSWORD: ""
          # REDIS_URL: redis://localhost:6379/0
        run: bin/rails db:test:prepare test test:system

      - name: Model/DB consistency (database_consistency, advisory)
        # BASELINE (dev-env setup): ADVISORY (`|| true`) — ~380 pre-existing findings, mostly the
        # documented legacy integer-PK schema (see CLAUDE.md › Database). Reports without failing
        # CI; drop the `|| true` to re-gate once addressed (see plans/off-topic-improvements.md).
        env:
          RAILS_ENV: test
          DB_USERNAME: root
          DB_PASSWORD: ""
        run: bundle exec database_consistency || true

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  # Run the MIT-licensed gitleaks CLI (via mise, version-pinned in mise.lock) rather than
  # gitleaks/gitleaks-action: the action requires a paid GITLEAKS_LICENSE on org-owned repos,
  # while the CLI is free for all repos and is exactly what the local hk pre-commit hook runs.
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # gitleaks git scans the full commit history

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Scan git history for secrets
        run: mise exec -- gitleaks git --redact --no-banner .

  # GitHub Actions static analysis: actionlint (correctness — schema/expressions) +
  # zizmor (security — credential persistence, template injection, token scope). Mirrors the hk
  # actionlint/zizmor steps. Both tools are mise-pinned (mise.lock).
  actions-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Lint workflows (actionlint)
        # -shellcheck= disables actionlint's shellcheck-of-run: pass (run: blocks word-split
        # deliberately; real *.sh files are covered by other checks).
        run: actionlint -shellcheck=

      - name: Scan workflows with zizmor
        run: zizmor --no-progress .github/workflows/

  # Noisier audits — mirror the hk `check` hook (debride, flay, fasterer, jscpd, large files).
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Dead code (debride)
        # bundler-cache installs gems into vendor/bundle inside the repo, so exclude it (plus other
        # non-source dirs) or debride scans every gem's source as "dead code". Mirrors the hk step.
        run: bundle exec debride --exclude vendor,node_modules,tmp,log .

      - name: Duplication (flay — Ruby structural, advisory)
        run: bundle exec flay . || true # flay exits 0 anyway; surfaces structural clones

      - name: Performance anti-patterns (fasterer — advisory)
        run: bundle exec fasterer || true

      - name: Duplication (jscpd — polyglot gate)
        # Runner + version policy (latest on a 4-day cooldown, floored at v5) are shared with the
        # hk pre-commit gate via scripts/run-jscpd.sh; --require keeps CI strict (unrunnable jscpd
        # fails the job). .jscpd.json carries minTokens/threshold/reporters/gitignore/ignore globs.
        run: bash scripts/run-jscpd.sh --require ruby,erb,javascript,typescript,css,scss,sass,vue

      - name: Large files
        run: |
          limit=512000
          large=$(git ls-files | while read -r f; do
            s=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$s" -gt "$limit" ]; then echo "$f ($s bytes)"; fi
          done)
          if [ -n "$large" ]; then echo "Files exceed ${limit} bytes:"; echo "$large"; exit 1; fi
